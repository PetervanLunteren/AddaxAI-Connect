services:
  # PostgreSQL Database with PostGIS
  postgres:
    image: postgis/postgis:15-3.3
    container_name: addaxai-postgres
    restart: unless-stopped
    profiles: [deepfaune, speciesnet, demo]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - addaxai-network

  # Redis Message Queue
  redis:
    image: redis:7-alpine
    container_name: addaxai-redis
    restart: unless-stopped
    profiles: [deepfaune, speciesnet, demo]
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - addaxai-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: addaxai-minio
    restart: unless-stopped
    profiles: [deepfaune, speciesnet, demo]
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"  # S3 API - localhost only for nginx proxy
      - "127.0.0.1:9001:9001"  # Web Console - localhost only for nginx proxy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - addaxai-network

  # MinIO Bucket Initialization
  # When COLD_TIER_ENDPOINT is set, also registers the remote tier and installs
  # a tag-based ILM rule so objects carrying tag `tier=cold` transition there.
  minio-init:
    image: minio/mc:latest
    container_name: addaxai-minio-init
    profiles: [deepfaune, speciesnet, demo]
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set minio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb --ignore-existing minio/raw-images;
      /usr/bin/mc mb --ignore-existing minio/crops;
      /usr/bin/mc mb --ignore-existing minio/thumbnails;
      /usr/bin/mc mb --ignore-existing minio/models;
      /usr/bin/mc mb --ignore-existing minio/project-images;
      /usr/bin/mc mb --ignore-existing minio/project-documents;
      /usr/bin/mc version enable minio/raw-images;
      if [ -n '${COLD_TIER_ENDPOINT:-}' ]; then
        /usr/bin/mc ilm tier update minio '${COLD_TIER_NAME:-WASABI_COLD}' --access-key '${COLD_TIER_ACCESS_KEY}' --secret-key '${COLD_TIER_SECRET_KEY}' || \
          /usr/bin/mc ilm tier add s3 minio '${COLD_TIER_NAME:-WASABI_COLD}' --endpoint '${COLD_TIER_ENDPOINT}' --access-key '${COLD_TIER_ACCESS_KEY}' --secret-key '${COLD_TIER_SECRET_KEY}' --bucket '${COLD_TIER_BUCKET}' --region '${COLD_TIER_REGION:-eu-central-1}' || true;
        /usr/bin/mc ilm rule add --transition-days 0 --transition-tier '${COLD_TIER_NAME:-WASABI_COLD}' --tags 'tier=cold' minio/raw-images || true;
        echo 'Cold tier configured';
      else
        echo 'Cold tier not configured (COLD_TIER_ENDPOINT empty)';
      fi;
      echo 'MinIO buckets created successfully';
      "
    networks:
      - addaxai-network

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: addaxai-api
    restart: unless-stopped
    profiles: [deepfaune, speciesnet, demo]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MAIL_SERVER: ${MAIL_SERVER}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      DOMAIN_NAME: ${DOMAIN_NAME}
      DEMO_MODE: ${DEMO_MODE:-false}
      CLASSIFICATION_MODEL: ${CLASSIFICATION_MODEL:-deepfaune}
      # Logging configuration
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      FTPS_UPLOAD_DIR: /uploads
      # FTPS connection for upload testing
      FTPS_HOST: ${FTPS_HOST:-host.docker.internal}
      FTPS_PORT: ${FTPS_PORT:-21}
      FTPS_USERNAME: ${FTPS_USERNAME:-camera}
      FTPS_PASSWORD: ${FTPS_PASSWORD}
      FTPS_USE_TLS: ${FTPS_USE_TLS:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ${FTPS_UPLOAD_DIR:-/opt/addaxai-connect/uploads}:/uploads
      - ./data/project-images:/app/project-images
      - ./data/reference-images:/app/reference-images
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - addaxai-network

  # Ingestion Service
  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    container_name: addaxai-ingestion
    restart: unless-stopped
    profiles: [deepfaune, speciesnet]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      FTPS_UPLOAD_DIR: /uploads
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ${FTPS_UPLOAD_DIR:-/opt/addaxai-connect/uploads}:/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - addaxai-network

  # Detection Worker
  detection:
    build:
      context: .
      dockerfile: services/detection/Dockerfile
    container_name: addaxai-detection
    restart: unless-stopped
    profiles: [deepfaune, speciesnet]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      DETECTION_MODEL_PATH: /models/detection/md_v1000.0.0-redwood.pt
      DETECTION_MODEL_URL: https://github.com/agentmorris/MegaDetector/releases/download/v1000.0/md_v1000.0.0-redwood.pt
      CONFIDENCE_THRESHOLD: 0.1
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - ./models:/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - addaxai-network

  # DeepFaune Classification Worker
  classification-deepfaune:
    build:
      context: .
      dockerfile: services/classification-deepfaune/Dockerfile
    container_name: addaxai-classification-deepfaune
    restart: unless-stopped
    profiles: [deepfaune]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      CLASSIFICATION_MODEL_PATH: /models/classification/deepfaune-vit_large_patch14_dinov2.lvd142m.v4.pt
      CLASSIFICATION_MODEL_URL: https://huggingface.co/Addax-Data-Science/Deepfaune_v1.4/resolve/main/deepfaune-vit_large_patch14_dinov2.lvd142m.v4.pt?download=true
      CROP_RESOLUTION: 182
      CONFIDENCE_THRESHOLD: 0.0
      TOP_N_PREDICTIONS: 1
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - ./models:/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - addaxai-network

  # SpeciesNet Classification Worker
  classification-speciesnet:
    build:
      context: .
      dockerfile: services/classification-speciesnet/Dockerfile
    container_name: addaxai-classification-speciesnet
    restart: unless-stopped
    profiles: [speciesnet]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      SPECIESNET_MODEL_DIR: /models/classification-speciesnet
      SPECIESNET_HF_REPO: Addax-Data-Science/SPECIESNET-v4-0-1-A-v1
      CONFIDENCE_THRESHOLD: 0.0
      TOP_N_PREDICTIONS: 1
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - ./models:/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - addaxai-network

  # Notifications Service - core notification coordinator
  notifications:
    build:
      context: .
      dockerfile: services/notifications/Dockerfile
    container_name: addaxai-notifications
    restart: unless-stopped
    profiles: [deepfaune, speciesnet]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      DOMAIN_NAME: ${DOMAIN_NAME}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - addaxai-network

  # Frontend
  frontend:
    build: ./services/frontend
    container_name: addaxai-frontend
    restart: unless-stopped
    profiles: [deepfaune, speciesnet, demo]
    ports:
      - "3000:80"
    volumes:
      - ./data/project-images:/usr/share/nginx/html/project-images
      - ./data/reference-images:/usr/share/nginx/html/reference-images
    depends_on:
      - api
    networks:
      - addaxai-network

  # Telegram Notifications Worker
  notifications-telegram:
    build:
      context: .
      dockerfile: services/notifications-telegram/Dockerfile
    container_name: addaxai-notifications-telegram
    restart: unless-stopped
    profiles: [deepfaune, speciesnet]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      DOMAIN_NAME: ${DOMAIN_NAME}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      notifications:
        condition: service_started
    networks:
      - addaxai-network

  # MinIO Cold-tier Watchdog
  # Daily check: if local raw-images exceeds COLD_TIER_HOT_BUDGET_GB, tags the
  # oldest objects with tier=cold so the ILM rule transitions them off-box.
  minio-tier-watchdog:
    build:
      context: .
      dockerfile: services/minio-tier-watchdog/Dockerfile
    container_name: addaxai-minio-tier-watchdog
    restart: unless-stopped
    profiles: [deepfaune, speciesnet]
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      COLD_TIER_ENDPOINT: ${COLD_TIER_ENDPOINT:-}
      COLD_TIER_HOT_BUDGET_GB: ${COLD_TIER_HOT_BUDGET_GB:-80}
      COLD_TIER_TICK_SECONDS: ${COLD_TIER_TICK_SECONDS:-86400}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./data/minio:/data:ro
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - addaxai-network

  # Dev-only mock cold tier (enable via COMPOSE_PROFILES=deepfaune,dev-cold-mock)
  # Lets local development exercise the hot → cold transition without a real
  # Wasabi account. Point COLD_TIER_ENDPOINT at http://minio-cold-mock:9000.
  minio-cold-mock:
    image: minio/minio:latest
    container_name: addaxai-minio-cold-mock
    profiles: [dev-cold-mock]
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9100:9000"
      - "127.0.0.1:9101:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio-cold-mock:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - addaxai-network

  minio-cold-mock-init:
    image: minio/mc:latest
    container_name: addaxai-minio-cold-mock-init
    profiles: [dev-cold-mock]
    depends_on:
      - minio-cold-mock
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set coldmock http://minio-cold-mock:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb --ignore-existing coldmock/${COLD_TIER_BUCKET:-cold-mock};
      echo 'Cold-mock bucket ready';
      "
    networks:
      - addaxai-network

  # Email Notifications Worker
  notifications-email:
    build:
      context: .
      dockerfile: services/notifications-email/Dockerfile
    container_name: addaxai-notifications-email
    restart: unless-stopped
    profiles: [deepfaune, speciesnet]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MAIL_SERVER: ${MAIL_SERVER}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      DOMAIN_NAME: ${DOMAIN_NAME}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      notifications:
        condition: service_started
    networks:
      - addaxai-network

networks:
  addaxai-network:
    driver: bridge
