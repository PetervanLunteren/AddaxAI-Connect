services:
  # PostgreSQL Database with PostGIS
  postgres:
    image: postgis/postgis:15-3.3
    container_name: addaxai-postgres
    restart: unless-stopped
    profiles: [deepfaune, speciesnet, demo]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - addaxai-network

  # Redis Message Queue
  redis:
    image: redis:7-alpine
    container_name: addaxai-redis
    restart: unless-stopped
    profiles: [deepfaune, speciesnet, demo]
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - addaxai-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: addaxai-minio
    restart: unless-stopped
    profiles: [deepfaune, speciesnet, demo]
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"  # S3 API - localhost only for nginx proxy
      - "127.0.0.1:9001:9001"  # Web Console - localhost only for nginx proxy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
      # Host image dirs, mounted rw so scripts/backup.sh reads from them and
      # scripts/restore.sh writes back to them. Neither script ever deletes in
      # the source direction, so there's no write hazard during backup.
      - ./data/project-images:/host/project-images
      - ./data/reference-images:/host/reference-images
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - addaxai-network

  # MinIO Bucket Initialization
  # When COLD_TIER_ENABLED=true, also registers the remote tier and installs
  # tag-based ILM rules so objects carrying tag `tier=cold` transition there.
  # Recreates the tier registration on bucket/endpoint change.
  minio-init:
    image: minio/mc:latest
    container_name: addaxai-minio-init
    profiles: [deepfaune, speciesnet, demo]
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      COLD_TIER_ENABLED: ${COLD_TIER_ENABLED:-false}
      COLD_TIER_NAME: ${COLD_TIER_NAME:-WASABI_COLD}
      COLD_TIER_ENDPOINT: ${COLD_TIER_ENDPOINT:-}
      COLD_TIER_REGION: ${COLD_TIER_REGION:-eu-central-1}
      COLD_TIER_BUCKET: ${COLD_TIER_BUCKET:-}
      COLD_TIER_PREFIX: ${COLD_TIER_PREFIX:-}
      COLD_TIER_ACCESS_KEY: ${COLD_TIER_ACCESS_KEY:-}
      COLD_TIER_SECRET_KEY: ${COLD_TIER_SECRET_KEY:-}
    volumes:
      - ./services/minio-init/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks:
      - addaxai-network

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: addaxai-api
    restart: unless-stopped
    profiles: [deepfaune, speciesnet, demo]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MAIL_SERVER: ${MAIL_SERVER}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      DOMAIN_NAME: ${DOMAIN_NAME}
      DEMO_MODE: ${DEMO_MODE:-false}
      CLASSIFICATION_MODEL: ${CLASSIFICATION_MODEL:-deepfaune}
      # Logging configuration
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-false}
      FTPS_UPLOAD_DIR: /uploads
      # FTPS connection for upload testing
      FTPS_HOST: ${FTPS_HOST:-host.docker.internal}
      FTPS_PORT: ${FTPS_PORT:-21}
      FTPS_USERNAME: ${FTPS_USERNAME:-camera}
      FTPS_PASSWORD: ${FTPS_PASSWORD}
      FTPS_USE_TLS: ${FTPS_USE_TLS:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ${FTPS_UPLOAD_DIR:-/opt/addaxai-connect/uploads}:/uploads
      - ./data/project-images:/app/project-images
      - ./data/reference-images:/app/reference-images
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - addaxai-network

  # Ingestion Service
  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    container_name: addaxai-ingestion
    restart: unless-stopped
    profiles: [deepfaune, speciesnet]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      FTPS_UPLOAD_DIR: /uploads
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ${FTPS_UPLOAD_DIR:-/opt/addaxai-connect/uploads}:/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - addaxai-network

  # Bulk-upload worker. Drains the bulk-upload-job queue one job at a
  # time, extracts each ZIP entry into the live pipeline via the bulk
  # priority queues. Live cameras keep priority on Detection +
  # Classification via BLPOP key ordering.
  bulk-upload:
    build:
      context: .
      dockerfile: services/bulk-upload/Dockerfile
    container_name: addaxai-bulk-upload
    restart: unless-stopped
    profiles: [deepfaune, speciesnet]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - addaxai-network

  # Detection Worker
  detection:
    build:
      context: .
      dockerfile: services/detection/Dockerfile
    container_name: addaxai-detection
    restart: unless-stopped
    profiles: [deepfaune, speciesnet]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      DETECTION_MODEL_PATH: /models/detection/md_v1000.0.0-redwood.pt
      DETECTION_MODEL_URL: https://github.com/agentmorris/MegaDetector/releases/download/v1000.0/md_v1000.0.0-redwood.pt
      CONFIDENCE_THRESHOLD: 0.1
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - ./models:/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - addaxai-network

  # DeepFaune Classification Worker
  classification-deepfaune:
    build:
      context: .
      dockerfile: services/classification-deepfaune/Dockerfile
    container_name: addaxai-classification-deepfaune
    restart: unless-stopped
    profiles: [deepfaune]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      CLASSIFICATION_MODEL_PATH: /models/classification/deepfaune-vit_large_patch14_dinov2.lvd142m.v4.pt
      CLASSIFICATION_MODEL_URL: https://huggingface.co/Addax-Data-Science/Deepfaune_v1.4/resolve/main/deepfaune-vit_large_patch14_dinov2.lvd142m.v4.pt?download=true
      CROP_RESOLUTION: 182
      CONFIDENCE_THRESHOLD: 0.0
      TOP_N_PREDICTIONS: 1
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - ./models:/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - addaxai-network

  # SpeciesNet Classification Worker
  classification-speciesnet:
    build:
      context: .
      dockerfile: services/classification-speciesnet/Dockerfile
    container_name: addaxai-classification-speciesnet
    restart: unless-stopped
    profiles: [speciesnet]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      SPECIESNET_MODEL_DIR: /models/classification-speciesnet
      SPECIESNET_HF_REPO: Addax-Data-Science/SPECIESNET-v4-0-1-A-v1
      CONFIDENCE_THRESHOLD: 0.0
      TOP_N_PREDICTIONS: 1
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - ./models:/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - addaxai-network

  # Notifications Service - core notification coordinator
  notifications:
    build:
      context: .
      dockerfile: services/notifications/Dockerfile
    container_name: addaxai-notifications
    restart: unless-stopped
    profiles: [deepfaune, speciesnet]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      DOMAIN_NAME: ${DOMAIN_NAME}
      DISK_ALERT_THRESHOLDS: ${DISK_ALERT_THRESHOLDS:-80,90,95}
      # For infra_alert.py. ADMIN_EMAIL is needed for the TEMP success mails.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-false}
      COLD_TIER_ENABLED: ${COLD_TIER_ENABLED:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      # Read-only host-root mount so the disk usage alert can measure the
      # actual disk, not the container's overlay filesystem.
      - /:/host:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - addaxai-network

  # Frontend
  frontend:
    build: ./services/frontend
    container_name: addaxai-frontend
    restart: unless-stopped
    profiles: [deepfaune, speciesnet, demo]
    ports:
      - "3000:80"
    volumes:
      - ./data/project-images:/usr/share/nginx/html/project-images
      - ./data/reference-images:/usr/share/nginx/html/reference-images
    depends_on:
      - api
    networks:
      - addaxai-network

  # Telegram Notifications Worker
  notifications-telegram:
    build:
      context: .
      dockerfile: services/notifications-telegram/Dockerfile
    container_name: addaxai-notifications-telegram
    restart: unless-stopped
    profiles: [deepfaune, speciesnet]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      DOMAIN_NAME: ${DOMAIN_NAME}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      notifications:
        condition: service_started
    networks:
      - addaxai-network

  # MinIO Cold-tier Watchdog
  # Daily check: if local raw-images exceeds COLD_TIER_HOT_BUDGET_GB, tags the
  # oldest objects with tier=cold so the ILM rule transitions them off-box.
  minio-tier-watchdog:
    build:
      context: .
      dockerfile: services/minio-tier-watchdog/Dockerfile
    container_name: addaxai-minio-tier-watchdog
    restart: unless-stopped
    profiles: [deepfaune, speciesnet]
    environment:
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      COLD_TIER_ENABLED: ${COLD_TIER_ENABLED:-false}
      COLD_TIER_ENDPOINT: ${COLD_TIER_ENDPOINT:-}
      COLD_TIER_HOT_BUDGET_GB: ${COLD_TIER_HOT_BUDGET_GB:-80}
      COLD_TIER_TICK_SECONDS: ${COLD_TIER_TICK_SECONDS:-86400}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./data/minio:/data:ro
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - addaxai-network

  # Email Notifications Worker
  notifications-email:
    build:
      context: .
      dockerfile: services/notifications-email/Dockerfile
    container_name: addaxai-notifications-email
    restart: unless-stopped
    profiles: [deepfaune, speciesnet]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MAIL_SERVER: ${MAIL_SERVER}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      DOMAIN_NAME: ${DOMAIN_NAME}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      notifications:
        condition: service_started
    networks:
      - addaxai-network

networks:
  addaxai-network:
    driver: bridge
