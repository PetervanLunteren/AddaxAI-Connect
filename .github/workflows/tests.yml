name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('shared/pyproject.toml', 'services/*/requirements.txt') }}
      - name: Install shared library
        run: pip install -e ./shared
      - name: Install test dependencies
        run: pip install pytest
      - name: Install service dependencies (skip ML)
        run: |
          pip install -r services/api/requirements.txt
          pip install -r services/ingestion/requirements.txt
          pip install -r services/notifications/requirements.txt
          pip install -r services/notifications-telegram/requirements.txt
          pip install -r services/notifications-email/requirements.txt
      - name: Run tests
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          REDIS_URL: "redis://localhost:6379/0"
          MINIO_ENDPOINT: "localhost:9000"
          MINIO_ACCESS_KEY: "minioadmin"
          MINIO_SECRET_KEY: "minioadmin"
          LOG_LEVEL: "WARNING"
          LOG_FORMAT: "text"
          ENVIRONMENT: "test"
        run: pytest tests/ -v --tb=short -m "not ml"
