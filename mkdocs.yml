site_name: AddaxAI Connect
site_url: https://petervanlunteren.github.io/AddaxAI-Connect/
repo_url: https://github.com/PetervanLunteren/AddaxAI-Connect
repo_name: PetervanLunteren/AddaxAI-Connect

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - md_in_html

extra_css:
  - assets/custom.css

nav:
  - Home: index.md
  - Getting started:
    - Deployment: deployment.md
    - Setup guide: setup-guide.md
    - Camera requirements: camera-requirements.md
  - Guides:
    - SpeciesNet setup: speciesnet-setup.md
  - Reference:
    - Architecture: architecture.md
