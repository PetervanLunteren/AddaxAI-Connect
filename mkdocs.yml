site_name: AddaxAI Connect docs
site_url: https://petervanlunteren.github.io/AddaxAI-Connect/
repo_url: https://github.com/PetervanLunteren/AddaxAI-Connect
repo_name: PetervanLunteren/AddaxAI-Connect

theme:
  name: material
  logo: assets/logo-icon.png
  favicon: assets/favicon.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - md_in_html

extra_css:
  - assets/custom.css

nav:
  - Home: index.md
  - Getting started:
    - Deployment: deployment.md
    - Setup guide: setup-guide.md
    - Camera requirements: camera-requirements.md
    - SpeciesNet setup: speciesnet-setup.md
    - Install as an app: install-as-app.md
  - Running your server:
    - Operations and monitoring: operations.md
    - Update guide: update-guide.md
    - Restore guide: restore-guide.md
  - Reference:
    - Architecture: architecture.md
    - Sites and cameras: sites-and-deployments.md
  - Developer:
    - Dev server setup: dev-server-setup.md
